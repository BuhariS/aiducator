{% extends "base.html" %}
{% block title %}Profile · AIDUCATOR{% endblock %}
{% block content %}
<section class="mx-auto max-w-3xl px-4 py-12 sm:px-6 lg:px-8">
  <div class="surface-card p-6 sm:p-10">
    <p class="text-sm font-bold uppercase tracking-[0.2em] text-emerald">Account</p>
    <h1 class="mt-3 text-3xl font-black text-ink">Your profile</h1>
    <div class="mt-8 grid gap-4 sm:grid-cols-2">
      <div class="rounded-2xl bg-cloud p-5"><p class="text-xs font-bold uppercase tracking-wider text-slate-500">Name</p><p class="mt-2 font-bold text-ink">{{ request.user.get_full_name|default:"Not set" }}</p></div>
      <div class="rounded-2xl bg-cloud p-5"><p class="text-xs font-bold uppercase tracking-wider text-slate-500">Email</p><p class="mt-2 font-bold text-ink">{{ request.user.email }}</p></div>
      <div class="rounded-2xl bg-cloud p-5"><p class="text-xs font-bold uppercase tracking-wider text-slate-500">Language</p><p class="mt-2 font-bold text-ink">{{ request.user.preferred_language }}</p></div>
    </div>
  </div>
</section>
{% endblock %}
