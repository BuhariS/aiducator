{% extends "base.html" %}
{% block title %}Reset password · AIDUCATOR{% endblock %}
{% block content %}
<section class="mx-auto max-w-xl px-4 py-16 sm:px-6">
  <div class="surface-card p-6 sm:p-10">
    <p class="text-sm font-bold uppercase tracking-[0.2em] text-emerald">Account recovery</p>
    <h1 class="mt-3 text-3xl font-black text-ink">Reset your password</h1>
    <p class="mt-2 text-slate-500">Enter your account email and we will send a secure reset link.</p>
    <form method="post" class="mt-8 space-y-5">{% csrf_token %}{{ form.email.errors }}<label class="block text-sm font-bold text-slate-700" for="id_email">Email address</label>{{ form.email }}<button class="primary-button w-full" type="submit">Send reset link</button></form>
  </div>
</section>
<style>input { width: 100%; border-radius: 0.75rem; border: 1px solid rgb(226 232 240); padding: 0.75rem 1rem; outline: none; } input:focus { border-color: rgb(15 118 110); box-shadow: 0 0 0 4px rgb(15 118 110 / 0.1); }</style>
{% endblock %}
